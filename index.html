<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - MTC App Notification Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.min.css">
</head>

<nav id="navbar" style="display:none;" class="navbar fixed-top navbar-expand-lg navbar-light bg-light">
   <a class="mx-2"  style="display:none;" href=""><i class="bi bi-person-circle"></i> My Account</a>
   <button id="btnLogOut" type="button" class="btn btn-primary mx-2"><i class="bi bi-door-closed"></i>Logout</button>
</nav>

<body class="w-100 vh-100 d-flex justify-content-center align-items-center">
    <div class="card" id="loginPage" >
        <div class="card-body">
            <h1 class="text-center">Council App Notifications Portal</h1>
            <form class="mt-4">
                <label for="txtUsername" class="form-label">Username</label>
                <input type="text" id="txtUsername" class="form-control">
                <label for="txtPassword" class="form-label mt-2">Password</label>
                <input type="" id="txtPassword" class="form-control">
                <button id="btnLogin" type="button" class="btn btn-primary mt-4 col-12 col-md-12 col-sm-12">Login</button>
            </form>
        </div>
    </div>
    <div id="notifications_page" style="display:none;">
        <div class="card" id="sendANotificationPage" style="display:inherit;">
            <div class="card-body">
                <h1 class="txt-center">Send a Notification</h1>
                <form id="notificationForm">
                    <label for="txtNotificationTitle" class=" mt-4 form-label">Notification Title</label>
                    <input type="text" class="form-control" id="txtNotificationTitle" maxlength="50">
                    <label for="txtNotificationBody" class="mt-1 form-label">Notification Body</label>
                    <textarea type="text" class="form-control" id="txtNotificationBody" maxlength="255"></textarea>
                    <div class="form-check mt-3">
                        <input class="form-check-input" type="checkbox" id="chkScheduleNotification">
                        <label class="form-check-label" for="chkScheduleNotification">
                            Schedule for later
                        </label>
                    </div>
                    <div id="scheduleFieldsContainer" class="d-none">
                        <div class="mb-3 mt-3">
                            <label for="notificationDate" class="form-label">Date</label>
                            <input type="date" class="form-control" id="notificationDate">
                        </div>
                        <div class="mb-3">
                            <label for="notificationTime" class="form-label">Time</label>
                            <input type="time" class="form-control" id="notificationTime">
                        </div>
                    </div>
                    <button id="notificationSubmitBtn" class="btn btn-primary mt-4 col-12 col-md-12 col-sm-12" type="button">Send Notification</button>
                </form>
            </div>
        </div>

        <div class="card mt-3" style="display:inherit;" id="notificationsPage">
            <div class="card-body">
                <h1 class="txt-center">Scheduled Notifications</h1>
                <table class="table table-striped" id="tblScheduledNotificationsUser">
                    <thead>
                        <tr>
                        <th scope="col">Title</th>
                        <th scope="col">Date To Send</th>
                        <th scope="col">Scheduled By</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Opening Notification</td>
                            <td>2023-10-15</td>
                            <td>John Doe</td>
                        </tr>
                        <tr>
                            <td>Closing Notification</td>
                            <td>2023-10-20</td>
                            <td>Jane Smith</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
    </div>
    
    <script
    src="https://code.jquery.com/jquery-4.0.0.js"
    integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
    crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.min.js"></script>
    <script src="./script/tabhandler.js"></script>
    <script src="./script/loginlogout.js"></script>
    <script src="./script/notificationFormHandler.js"></script>
    <script>
        let table = new DataTable('#tblScheduledNotificationsUser');
    </script>
</body>
</html>
