<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User - MTC App Notification Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<nav id="navbar" style="display:none;" class="navbar fixed-top navbar-expand-lg navbar-light bg-light">
   <a class="mx-2" href=""><i class="bi bi-person-circle"></i> My Account</a>
   <button id="btnLogOut" type="button" class="btn btn-primary mx-2"><i class="bi bi-door-closed"></i>Logout</button>
</nav>

<body class="w-100 vh-100 d-flex justify-content-center align-items-center">

    <div class="card" id="loginPage" >
        <div class="card-body">
            <h1 class="text-center">Council App Notifications Portal</h1>
            <form class="mt-4">
                <label for="txtUsername" class="form-label">Username</label>
                <input type="text" id="txtUsername" class="form-control">
                <label for="txtPassword" class="form-label mt-2">Password</label>
                <input type="" id="txtPassword" class="form-control">
                <button id="btnLogin" type="button" class="btn btn-primary mt-4 col-12 col-md-12 col-sm-12">Login</button>
                <button type="button" class="btn btn-outline-secondary mt-1 col-12 col-md-12 col-sm-12">Create Account</button>
            </form>
        </div>
    </div>

    <div class="card" id="sendANotificationPage" style="display:none;">
        <div class="card-body">
            <h1 class="txt-center">Send a Notification</h1>
            <form>
                <label for="txtNotificationTitle" class=" mt-4 form-label">Notification Title</label>
                <input type="text" class="form-control" id="txtNotificationTitle">
                <label for="txtNotificationBody" class="mt-1 form-label">Notification Body</label>
                <textarea type="text" class="form-control" id="txtNotificationBody"></textarea>
                <button class="btn btn-primary mt-4 col-12 col-md-12 col-sm-12" type="button">Send Notification</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./script/tabhandler.js"></script>
    <script src="./script/loginlogout.js"></script>
</body>
</html>
