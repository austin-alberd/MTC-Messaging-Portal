<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body class="w-100 vh-100 d-flex justify-content-center align-items-center">
    <div class="card">
        <div class="card-body">
            <h1 class="text-center">Council App Notifications Portal</h1>
            <form class="mt-4">
                <label for="txtUsername" class="form-label">Username</label>
                <input type="text" id="txtUsername" class="form-control">
                <label for="txtPassword" class="form-label mt-2">Password</label>
                <input type="" id="txtPassword" class="form-control">
                <button id="btnLogin" type="button" class="btn btn-primary mt-4 col-8 col-md-12 col-sm-12">Login</button>
                <button type="button" class="btn btn-outline-secondary mt-1 col-8 col-md-12 col-sm-12">Create Account</button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
