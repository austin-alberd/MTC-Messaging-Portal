<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>



<body>
    <h1>Admin Menu</h1>
    <div id="adminMenuButtons" class="d-flex">
        <button id="accountManagementBtn" type="button" class="btn btn-outline-primary mx-3">Account Management</button>
        <button id = "notificationsBtn" type="button" class="btn btn-outline-primary mx-3">Notifications</button>
        <button id = "systemManagementBtn" type="button" class="btn btn-outline-warning mx-3">System Management</button>
    </div>

    <div id="accountManagement" class="card mt-3">
        <div class="card-body">
            <h2>Accounts</h2>
            <button type="button" class="btn mx-3 btn-primary">Add</button>
            <button type="button" class="btn mx-3 btn-secondary">Update</button>
            <button type="button" class="btn mx-3 btn-danger">Remove</button>

            <div class="table-responsive">
            <table class="my-3 table table-striped table-bordered">
                <thead>
                    <tr>
                        <th scope="col">Account Name</th>
                        <th scope="col">Email</th>
                        <th scope="col">Type</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>aalberd</td>
                        <td>aalberd@test.com</td>
                        <td>Admin</td>
                    </tr>
                    <tr>
                        <td>balberd</td>
                        <td>balberd@test.com</td>
                        <td>User</td>
                    </tr>
                </tbody>
            </table>
            </div>
            
        </div>
    </div>



    <div id="notifications" class="card mt-3" style="display:none;">
        <div >
            <h2>Notifications</h2>
            <div class="card mt-2">
                <div class="card-body">
                    <h3>Send a Notification</h3>
                    <form>
                        <label for="txtNotificationTitle" class=" mt-4 form-label">Notification Title</label>
                        <input type="text" class="form-control" id="txtNotificationTitle">
                        <label for="txtNotificationBody" class="mt-1 form-label">Notification Body</label>
                        <textarea type="text" class="form-control" id="txtNotificationBody"></textarea>
                        <button class="btn btn-primary mt-4 col-12 col-md-12 col-sm-12" type="button">Send Notification</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-3" id="systemManagement" style="display:none;">
        <div  class="card-body">
            <h2>System Management</h2>
            <p>I dunno what to put here its just a place holder</p>
            <img src="https://i.imgflip.com/2adszq.jpg" alt="">
        </div>
    </div>
    <script src="/script/adminPageTabHandler.js"></script>
</body>
</html>
